  <line x1="8"  y1="9" x2="8"  y2="18" stroke="#10b981" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="12" y1="9" x2="12" y2="18" stroke="#10b981" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16" y1="9" x2="16" y2="18" stroke="#10b981" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="20" y1="9" x2="20" y2="18" stroke="#10b981" stroke-width="1.4" stroke-linecap="round"/>
