<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Central AI core (hexagon) -->
  <polygon points="12,3 18,6.5 18,13.5 12,17 6,13.5 6,6.5" stroke="#10b981" stroke-width="1.5" stroke-linejoin="round" fill="rgba(16,185,129,0.1)"/>
  <!-- Inner circuit nodes -->
  <circle cx="12" cy="10" r="2" fill="#10b981"/>
  <!-- Radiating attack vectors (6 directions) -->
  <line x1="12" y1="3"  x2="12" y2="5.5"  stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="18" y1="6.5" x2="15.8" y2="7.8" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="18" y1="13.5" x2="15.8" y2="12.2" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="12" y1="17" x2="12" y2="14.5" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="6" y1="13.5" x2="8.2" y2="12.2" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="6" y1="6.5"  x2="8.2" y2="7.8"  stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Scan ring -->
  <circle cx="12" cy="10" r="4.5" stroke="#10b981" stroke-width="0.8" opacity="0.3" stroke-dasharray="2 1.5"/>
  <!-- Bottom label dots -->
  <line x1="6" y1="21" x2="18" y2="21" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
</svg>
