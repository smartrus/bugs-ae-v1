<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 4 NomadX family nodes (corners) connected to center -->
  <!-- Center hub -->
  <circle cx="12" cy="12" r="2.5" fill="#10b981"/>
  <!-- Top-left: nomadx.ae (indigo) -->
  <circle cx="5" cy="5" r="2" stroke="#10b981" stroke-width="1.2" fill="rgba(16,185,129,0.1)"/>
  <!-- Top-right: devsecops.ae -->
  <circle cx="19" cy="5" r="2" stroke="#10b981" stroke-width="1.2" fill="rgba(16,185,129,0.1)"/>
  <!-- Bottom-left: kubernetes.ae -->
  <circle cx="5" cy="19" r="2" stroke="#10b981" stroke-width="1.2" fill="rgba(16,185,129,0.1)"/>
  <!-- Bottom-right: ledgers.ae -->
  <circle cx="19" cy="19" r="2" stroke="#10b981" stroke-width="1.2" fill="rgba(16,185,129,0.1)"/>
  <!-- Connecting spokes -->
  <line x1="6.4" y1="6.4" x2="10.2" y2="10.2" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="17.6" y1="6.4" x2="13.8" y2="10.2" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="6.4" y1="17.6" x2="10.2" y2="13.8" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="17.6" y1="17.6" x2="13.8" y2="13.8" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <!-- Outer scan ring -->
  <circle cx="12" cy="12" r="7" stroke="#10b981" stroke-width="0.8" opacity="0.2" stroke-dasharray="2 2"/>
</svg>
