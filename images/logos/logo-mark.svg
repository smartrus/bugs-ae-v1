<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer hexagon: circuit scan frame (pointy-top) -->
  <polygon points="16,3 27.3,9.5 27.3,22.5 16,29 4.7,22.5 4.7,9.5"
           stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
  <!-- Hex fill: subtle -->
  <polygon points="16,3 27.3,9.5 27.3,22.5 16,29 4.7,22.5 4.7,9.5"
           fill="currentColor" opacity="0.05"/>
  <!-- Horizontal scan lines: graduated beam scanning aesthetic -->
  <line x1="9" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <line x1="6.5" y1="16" x2="25.5" y2="16" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="9" y1="20" x2="23" y2="20" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <!-- Detection node: bug found at scan beam centre -->
  <circle cx="16" cy="16" r="2.5" fill="currentColor"/>
</svg>
